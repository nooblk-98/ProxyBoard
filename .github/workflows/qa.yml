name: QA — Tests & Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flask qrcode[pil] pytest

      - name: Unit tests
        run: python -m pytest web/tests/ -v

      - name: Integration test — all app functions
        run: python scripts/qa_integration.py
