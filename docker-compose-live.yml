version: '3.8'

services:
  proxyboard:
    image: lahiru98s/proxyboard:latest
    container_name: proxyboard
    restart: unless-stopped
    expose:
      - "8088"
    volumes:
      - proxyboard-data:/data
    environment:
      - UI_PORT=8088
      - XRAY_DOMAIN=${DOMAIN}
      # Optional auth — uncomment to enable login
      # - UI_USERNAME=admin
      # - UI_PASSWORD=yourpassword
    depends_on:
      - nginx

  nginx:
    image: nginx:alpine
    container_name: proxyboard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - certbot

  certbot:
    image: certbot/certbot:latest
    container_name: proxyboard-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: >
      sh -c "
        certbot certonly --webroot --webroot-path=/var/www/certbot
        --non-interactive --agree-tos
        --email $${CERTBOT_EMAIL}
        -d $${DOMAIN}
        && while true; do
          certbot renew --quiet --webroot --webroot-path=/var/www/certbot;
          sleep 12h;
        done
      "
    environment:
      - DOMAIN=${DOMAIN}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}

volumes:
  proxyboard-data:
    driver: local
  certbot-www:
    driver: local
  certbot-certs:
    driver: local
