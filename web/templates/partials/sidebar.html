<aside class="mdc-drawer">
  <div class="mdc-drawer__header">
    <a href="{{ url_for('dashboard') }}" class="sidebar-logo-link">
      <img src="/static/icon-dark.svg" alt="ProxyBoard" class="sidebar-logo sidebar-logo--dark" />
      <img src="/static/icon-light.svg" alt="ProxyBoard" class="sidebar-logo sidebar-logo--light" />
    </a>
    <h6 class="mdc-drawer__subtitle">ProxyBoard</h6>
  </div>
  <div class="mdc-drawer__content">
    <nav class="mdc-list">
      <a class="mdc-list-item {{ 'mdc-list-item--activated' if page == 'dashboard' else '' }}" href="{{ url_for('dashboard') }}">
        <span class="mdc-list-item__ripple"></span>
        <i class="material-icons mdc-list-item__graphic" aria-hidden="true">dashboard</i>
        <span class="mdc-list-item__text">Dashboard</span>
      </a>
      <a class="mdc-list-item {{ 'mdc-list-item--activated' if page == 'configurations' else '' }}" href="{{ url_for('configurations') }}">
        <span class="mdc-list-item__ripple"></span>
        <i class="material-icons mdc-list-item__graphic" aria-hidden="true">dns</i>
        <span class="mdc-list-item__text">Configurations</span>
      </a>
      <a class="mdc-list-item {{ 'mdc-list-item--activated' if page == 'settings' else '' }}" href="{{ url_for('settings') }}">
        <span class="mdc-list-item__ripple"></span>
        <i class="material-icons mdc-list-item__graphic" aria-hidden="true">settings</i>
        <span class="mdc-list-item__text">Settings</span>
      </a>
      <a class="mdc-list-item {{ 'mdc-list-item--activated' if page == 'logs' else '' }}" href="{{ url_for('logs') }}">
        <span class="mdc-list-item__ripple"></span>
        <i class="material-icons mdc-list-item__graphic" aria-hidden="true">article</i>
        <span class="mdc-list-item__text">Logs</span>
      </a>
    </nav>
  </div>
  <div class="drawer-footer">
    <div class="status-chip {{ 'status-running' if status.running else 'status-stopped' }}">
      <i class="material-icons">{{ 'check_circle' if status.running else 'error' }}</i>
      {{ 'Engine Running' if status.running else 'Engine Stopped' }}
    </div>
    {% if auth_enabled %}
    <form method="post" action="/logout" style="margin-top:8px;">
      <button type="submit" class="mdc-button" style="width:100%; color:var(--mdc-theme-text-secondary-on-background); font-size:0.8rem;">
        <i class="material-icons mdc-button__icon" style="font-size:16px;">logout</i>
        <span class="mdc-button__label">Sign Out</span>
      </button>
    </form>
    {% endif %}
  </div>
</aside>
