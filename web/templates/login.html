<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NoobX-UI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-icon"><i class="material-icons">lock</i></div>
      <h1 class="login-title">NoobX-UI</h1>
      <p class="login-subtitle">Sign in to continue</p>
      {% if error %}
      <div class="mdc-snackbar mdc-snackbar--error" style="position:static; margin-bottom:16px;">
        <i class="material-icons">error</i> {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/login" class="login-form">
        <div class="cfg-field">
          <label class="cfg-label">Username</label>
          <input type="text" class="cfg-input" name="username" autocomplete="username" autofocus required />
        </div>
        <div class="cfg-field" style="margin-top:12px;">
          <label class="cfg-label">Password</label>
          <input type="password" class="cfg-input" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="mdc-button mdc-button--raised mdc-button--primary" style="width:100%; margin-top:24px; height:44px;">
          <i class="material-icons mdc-button__icon">login</i>
          <span class="mdc-button__label">Sign In</span>
        </button>
      </form>
    </div>
  </div>
</body>
</html>
