version: '3.8'

services:
  xray-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./xray-configs:/etc/xray:ro
      - ./certs:/certs:ro
      - ./logs:/var/log/xray
    environment:
      - XRAY_LOGLEVEL=info
      - TZ=UTC
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "8443:8443"
    stdin_open: true
    tty: true
    cap_add:
      - NET_BIND_SERVICE
