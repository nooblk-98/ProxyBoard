services:
  xray-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-web
    restart: unless-stopped
    network_mode: host
    environment:
      - UI_PORT=8088
      - XRAY_DOMAIN=example.com
    volumes:
      - xray-data:/data
    cap_add:
      - NET_BIND_SERVICE

volumes:
  xray-data:
