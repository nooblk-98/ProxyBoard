version: '3.8'

services:
  xray-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-server
    restart: unless-stopped
    network_mode: host  # Use host network for direct port binding
    volumes:
      - ./xray-configs:/etc/xray:ro
      - ./certs:/certs:ro
      - ./logs:/var/log/xray
    environment:
      - XRAY_LOGLEVEL=info
      - TZ=UTC
    ports:
      - "80:80"      # Port 80 WebSocket (fallback)
      - "443:443"    # Port 443 WebSocket + TLS
      - "8080:8080"  # Port 8080 WebSocket
      - "8443:8443"  # Port 8443 WebSocket + TLS
    stdin_open: true
    tty: true
    cap_add:
      - NET_BIND_SERVICE

  # Optional: Nginx reverse proxy for fallback
  nginx:
    image: nginx:alpine
    container_name: xray-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - xray-server
